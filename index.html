<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" aria-label="Scientific calculator">
      <section class="shell" role="application" aria-label="Calculator">
        <header class="topbar">
          <div class="brand">
            <div class="brand__dot" aria-hidden="true"></div>
            <div class="brand__text">
              <div class="brand__title">Scientific Calculator</div>
              <div class="brand__subtitle">fast • offline • keyboard-ready</div>
            </div>
          </div>
          <div class="status" aria-hidden="true">
            <span class="status__pill">ESC = clear</span>
            <span class="status__pill">Enter = equals</span>
          </div>
        </header>

        <div class="display" aria-live="polite" aria-atomic="true">
          <div id="hint" class="display__hint">Type an expression (e.g. <span class="mono">sin(30) + 2^3</span>)</div>
          <div id="expression" class="display__expr mono" title="Expression"></div>
          <div id="result" class="display__result mono" title="Result">0</div>
          <div id="error" class="display__error" role="alert"></div>
        </div>

        <div class="pad" role="group" aria-label="Calculator keypad">
          <!-- Row 1 -->
          <button class="key key--fn" data-action="clear" aria-label="Clear">AC</button>
          <button class="key key--fn" data-action="back" aria-label="Backspace">⌫</button>
          <button class="key key--fn" data-insert="(" aria-label="Left parenthesis">(</button>
          <button class="key key--fn" data-insert=")" aria-label="Right parenthesis">)</button>
          <button class="key key--op" data-insert="%" aria-label="Percent">%</button>
          <button class="key key--op" data-insert="/" aria-label="Divide">÷</button>

          <!-- Row 2 -->
          <button class="key key--fn" data-insert="sin(" aria-label="Sine">sin</button>
          <button class="key key--fn" data-insert="cos(" aria-label="Cosine">cos</button>
          <button class="key key--fn" data-insert="tan(" aria-label="Tangent">tan</button>
          <button class="key key--fn" data-insert="log(" aria-label="Log base 10">log</button>
          <button class="key key--fn" data-insert="ln(" aria-label="Natural log">ln</button>
          <button class="key key--op" data-insert="*" aria-label="Multiply">×</button>

          <!-- Row 3 -->
          <button class="key key--fn" data-insert="sqrt(" aria-label="Square root">√</button>
          <button class="key key--fn" data-insert="pi" aria-label="Pi">π</button>
          <button class="key key--fn" data-insert="e" aria-label="Euler's number">e</button>
          <button class="key" data-insert="7">7</button>
          <button class="key" data-insert="8">8</button>
          <button class="key" data-insert="9">9</button>

          <!-- Row 4 -->
          <button class="key key--fn" data-insert="abs(" aria-label="Absolute value">abs</button>
          <button class="key key--fn" data-insert="!" aria-label="Factorial">x!</button>
          <button class="key key--op" data-insert="^" aria-label="Power">xʸ</button>
          <button class="key" data-insert="4">4</button>
          <button class="key" data-insert="5">5</button>
          <button class="key" data-insert="6">6</button>

          <!-- Row 5 -->
          <button class="key key--fn" data-insert="round(" aria-label="Round">round</button>
          <button class="key key--fn" data-insert="floor(" aria-label="Floor">floor</button>
          <button class="key key--fn" data-insert="ceil(" aria-label="Ceil">ceil</button>
          <button class="key" data-insert="1">1</button>
          <button class="key" data-insert="2">2</button>
          <button class="key" data-insert="3">3</button>

          <!-- Row 6 -->
          <button class="key key--fn" data-action="toggle-sign" aria-label="Toggle sign">±</button>
          <button class="key" data-insert="0">0</button>
          <button class="key" data-insert="." aria-label="Decimal">.</button>
          <button class="key key--op" data-insert="-" aria-label="Minus">−</button>
          <button class="key key--op" data-insert="+" aria-label="Plus">+</button>
          <button class="key key--eq" data-action="equals" aria-label="Equals">=</button>
        </div>

        <footer class="footer">
          <div class="footer__note">
            Functions: <span class="mono">sin cos tan sqrt log ln abs round floor ceil</span>
          </div>
          <div class="footer__note">
            Tips: use <span class="mono">^</span> for power, <span class="mono">!</span> for factorial, parentheses supported.
          </div>
        </footer>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
